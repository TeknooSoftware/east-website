_teknoo_website_media:
    path: '/media/{id}'
    methods:  ['GET']
    defaults:
        _controller: 'teknoo.east.common.endpoint.media'
        errorTemplate: '@@TeknooEastCommon/Error/<error>.html.twig'

_teknoo_website_post:
    path: '/post/{slug}'
    methods:  ['GET']
    defaults:
        _controller: 'teknoo.east.website.endpoint.post'
        errorTemplate: '@@TeknooEastCommon/Error/<error>.html.twig'
        cleanHtml: "%teknoo.east.website.rendering.clean_html%"
        objectClass: 'Teknoo\East\WebsiteBundle\Form\DTO\Comment'
        formClass: 'Teknoo\East\WebsiteBundle\Form\Type\NewCommentType'
        formOptions:
            commentClass: 'Teknoo\East\Website\Doctrine\Object\Comment'
    requirements:
        slug: ((?!_wdt|_profiler).).+

_teknoo_website_post_comment:
    path: '/post/{slug}/comment'
    methods:  ['POST', 'PUT']
    defaults:
        _controller: 'teknoo.east.website.endpoint.post.comment'
        errorTemplate: '@@TeknooEastCommon/Error/<error>.html.twig'
        cleanHtml: "%teknoo.east.website.rendering.clean_html%"
        objectClass: '%teknoo.east.website.dto.comment.class%'
        formClass: 'Teknoo\East\WebsiteBundle\Form\Type\NewCommentType'
        formOptions:
            comment_class: '%teknoo.east.website.persisted.comment.class%'
    requirements:
        slug: ((?!_wdt|_profiler).).+

_teknoo_website_list_posts:
    path: '/posts/'
    methods:  ['GET']
    defaults:
        _controller: 'teknoo.east.website.endpoint.posts'
        errorTemplate: '@@TeknooEastCommon/Error/<error>.html.twig'
        template: "%teknoo.east.website.template.posts.list%"
        cleanHtml: "%teknoo.east.website.rendering.clean_html%"
        itemsPerPage: 10

_teknoo_website_list_posts_tag:
    path: '/posts/by/{tag}'
    methods:  ['GET']
    defaults:
        _controller: 'teknoo.east.website.endpoint.posts_of_tag'
        errorTemplate: '@@TeknooEastCommon/Error/<error>.html.twig'
        template: "%teknoo.east.website.template.posts.list_with_tags%"
        cleanHtml: "%teknoo.east.website.rendering.clean_html%"
        itemsPerPage: 10
    requirements:
        tag: ((?!_wdt|_profiler).).+

_teknoo_website_content:
    path: '/{slug}'
    methods:  ['GET']
    defaults:
        _controller: 'teknoo.east.website.endpoint.content'
        errorTemplate: '@@TeknooEastCommon/Error/<error>.html.twig'
        cleanHtml: "%teknoo.east.website.rendering.clean_html%"
    requirements:
        slug: ((?!_wdt|_profiler).).+

_teknoo_website_home:
    path: '/'
    methods:  ['GET']
    defaults:
        _controller: 'teknoo.east.website.endpoint.content'
        errorTemplate: '@@TeknooEastCommon/Error/<error>.html.twig'
        cleanHtml: "%teknoo.east.website.rendering.clean_html%"
        slug: '/'
